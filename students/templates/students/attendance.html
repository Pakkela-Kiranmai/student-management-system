{% extends 'students/base.html' %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">📋 Mark Attendance</h2>

    <form method="post">
        {% csrf_token %}

        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Student Name</th>
                    <th>Present</th>
                    <th>Absent</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.name }}</td>
                    <td>
                        <input type="radio" name="{{ student.id }}" value="Present" required>
                    </td>
                    <td>
                        <input type="radio" name="{{ student.id }}" value="Absent" required>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button type="submit" class="btn btn-primary">
            Save Attendance
        </button>
    </form>
</div>
{% endblock %}
