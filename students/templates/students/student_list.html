<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        h2 {
            text-align: center;
            color: white;
            margin-top: 20px;
        }

        .container {
            width: 80%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #4facfe;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #d1ecff;
            transition: 0.3s;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }

        .edit {
            background-color: #28a745;
        }

        .delete {
            background-color: #dc3545;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .add-btn {
            display: block;
            width: 150px;
            margin: 15px auto;
            padding: 10px;
            text-align: center;
            background: #007bff;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }

        .add-btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<h2>📋 Student Management Dashboard</h2>

<div class="container">

    <a href="/students/add/" class="add-btn">+ Add Student</a>

    <table>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Roll No</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.first_name }} {{ student.last_name }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.roll_number }}</td>
            <td>{{ student.course }}</td>
            <td>
                <button class="btn edit">Edit</button>
                <button class="btn delete">Delete</button>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
