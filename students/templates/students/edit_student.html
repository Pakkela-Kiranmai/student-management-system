{% extends 'students/base.html' %}
{% block content %}

<h2 class="mb-4">Edit Student</h2>

<div class="card shadow border-0 p-4">
    <form method="POST">
        {% csrf_token %}

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>First Name</label>
                <input type="text" name="first_name" class="form-control" value="{{ student.first_name }}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Last Name</label>
                <input type="text" name="last_name" class="form-control" value="{{ student.last_name }}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ student.email }}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Roll Number</label>
                <input type="text" name="roll_number" class="form-control" value="{{ student.roll_number }}" required>
            </div>

            <div class="col-md-12 mb-3">
                <label>Course</label>
                <input type="text" name="course" class="form-control" value="{{ student.course }}" required>
            </div>
        </div>

        <button class="btn btn-success w-100">Update Student</button>
    </form>
</div>

{% endblock %}
